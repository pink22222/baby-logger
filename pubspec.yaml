name: baby_logger
description: 养娃记录App - 参考Piyo日志

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 本地存储
  sqflite: ^2.3.0
  path: ^1.8.3
  # 状态管理
  provider: ^6.1.1
  # 日历
  table_calendar: ^3.0.9
  # 图表
  fl_chart: ^0.66.0
  # 图片
  image_picker: ^1.0.4
  # 通知提醒 - 固定版本避免兼容性问题
  flutter_local_notifications: 16.1.2
  timezone: ^0.9.2
  # 时间格式化
  intl: ^0.18.1
  # UUID
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
